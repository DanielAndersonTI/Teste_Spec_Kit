<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC - BMI Calculator</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="container">
        <h1>📊 Calculadora de IMC</h1>
        <p class="subtitle">Calcule seu Índice de Massa Corporal</p>

        <div class="error-message" id="errorMessage" role="alert"></div>

        <form id="bmiForm">
            <div class="input-wrapper">
                <div class="form-group">
                    <label for="weightInput">Peso (kg)</label>
                    <input 
                        type="number" 
                        id="weightInput" 
                        placeholder="Ex: 70" 
                        step="0.1"
                        min="0"
                        max="500"
                        aria-label="Peso em quilogramas"
                        aria-required="true"
                    >
                </div>
                <div class="form-group">
                    <label for="heightInput">Altura (m)</label>
                    <input 
                        type="number" 
                        id="heightInput" 
                        placeholder="Ex: 1.75" 
                        step="0.01"
                        min="0.5"
                        max="2.5"
                        aria-label="Altura em metros"
                        aria-required="true"
                    >
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-calculate" id="calculateBtn">
                    Calcular IMC
                </button>
                <button type="button" class="btn-clear" id="clearBtn">
                    Limpar
                </button>
            </div>
        </form>

        <div class="result-card" id="resultCard" role="region" aria-live="polite" aria-label="Resultado do cálculo">
            <div class="result-header">
                <div>
                    <div class="result-value" id="resultBMI">--</div>
                    <small style="color: #7F8C8D;">IMC</small>
                </div>
                <div class="result-emoji" id="resultEmoji">📊</div>
            </div>
            <div class="result-category" id="resultCategory">--</div>
            <div class="result-range">
                <div class="result-range-label">Intervalo de Peso Saudável</div>
                <div class="result-range-value" id="resultRange">-- a -- kg</div>
            </div>
        </div>
    </div>

    <script type="module" src="src/ui.js"></script>
</body>
</html>
